services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_ops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ai_ops_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_ops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  ai_ops_postgres_data: